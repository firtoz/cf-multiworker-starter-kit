name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Drizzle generated artifacts
        run: bun run check:drizzle-generated -- --base=origin/${{ github.event.pull_request.base.ref || 'main' }}

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Seed .env.local (required secrets; not committed)
        run: bun packages/scripts/setup-env.ts --yes

      - name: Build
        run: bun run build

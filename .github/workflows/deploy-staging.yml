name: Deploy staging

# Runs after lint / typecheck / build complete when **Quality checks** finishes on **`main`**
# (successful **push**, same commit — not PR runs on feature branches).
# If this workflow appears with a skipped “Deploy to staging” job, the completion was usually a **pull_request**
# Quality run or a failure; inspect the triggering run’s event / conclusion in the Actions UI.
on:
  workflow_run:
    workflows: ["Quality checks"]
    types: [completed]
    branches:
      - main

concurrency:
  group: deploy-staging-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to staging
    if:
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy preflight
        id: preflight
        env:
          CI: true
          STAGE: staging
          CF_STARTER_DEPLOY_ENABLED: ${{ vars.CF_STARTER_DEPLOY_ENABLED }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preflight:staging

      - name: Turbo deploy (staging)
        id: deploy
        if: steps.preflight.outputs.deploy_enabled == 'true'
        env:
          CI: true
          STAGE: staging
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          bun run deploy:staging 2>&1 | tee deploy-output.txt
          deploy_status=${PIPESTATUS[0]}
          URL_FILE="$GITHUB_WORKSPACE/.alchemy/ci/cf-starter-web-deploy-url.txt"
          WEB_URL=""
          if [[ -f "$URL_FILE" ]]; then
            IFS= read -r WEB_URL <"$URL_FILE" || true
          fi
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"
          exit "$deploy_status"

      - name: Deploy summary
        if: always()
        env:
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEB_URL_FROM_STEP: ${{ steps.deploy.outputs.web_url }}
        run: |
          PF_OUT="${{ steps.preflight.outcome }}"
          DE_OUT="${{ steps.deploy.outcome }}"
          EN="${{ steps.preflight.outputs.deploy_enabled }}"
          WEB_URL="$WEB_URL_FROM_STEP"
          URL_FILE="$GITHUB_WORKSPACE/.alchemy/ci/cf-starter-web-deploy-url.txt"
          if [[ -z "$WEB_URL" && -f "$URL_FILE" ]]; then
            IFS= read -r WEB_URL <"$URL_FILE" || true
          fi
          {
            echo "## Staging deploy"
            echo ""
            if [[ "$PF_OUT" == "failure" ]]; then
              echo "**Status:** preflight failed — see **Deploy preflight**."
            elif [[ "$PF_OUT" == "skipped" ]]; then
              echo "**Status:** an earlier step failed or was cancelled before preflight (often **Install dependencies**)."
            elif [[ "$EN" != "true" ]]; then
              echo "**Status:** skipped — \`CF_STARTER_DEPLOY_ENABLED\` is not \`true\` on the **staging** Environment (expected on a fresh fork)."
            elif [[ "$DE_OUT" == "success" ]]; then
              echo "**Status:** success"
              echo ""
              if [[ -n "$WEB_URL" ]]; then
                echo "**App (workers.dev):** [$WEB_URL]($WEB_URL)"
              else
                echo "- **workers.dev URL:** artifact missing — ${GITHUB_WORKSPACE}/.alchemy/ci/cf-starter-web-deploy-url.txt _(see apps/web/alchemy.run.ts when CI runs on GitHub Actions)._"
              fi
            elif [[ "$DE_OUT" == "failure" ]]; then
              echo "**Status:** Turbo deploy failed — see **Turbo deploy (staging)**."
            else
              echo "**Status:** unknown — inspect [this run]($WORKFLOW_URL)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

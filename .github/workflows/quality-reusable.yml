# Shared Drizzle drift, lint, typegen/typecheck, build. Called from **`main-push.yml`** and **`pr-deploy.yml`**.
name: Quality reusable

env:
  TURBO_TELEMETRY_DISABLED: "1"

on:
  workflow_call:
    inputs:
      concurrency_group_suffix:
        description: "Caller workflow + ref — stable concurrency key (see callers)."
        required: true
        type: string

concurrency:
  group: quality-${{ inputs.concurrency_group_suffix }}
  cancel-in-progress: true

jobs:
  drizzle_generated:
    name: Drizzle generated artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check Drizzle generated artifacts
        run: bun run check:drizzle-generated -- --base=origin/${{ github.event.pull_request.base.ref || 'main' }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Biome
        run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate types
        run: bun run typegen
      - name: Type check
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Seed .env.local (required secrets; not committed)
        run: bun run setup -- --yes
      - name: Build all packages
        run: bun run build

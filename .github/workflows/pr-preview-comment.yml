# Trusted PR preview commenter.
#
# The deploy workflow runs on `pull_request` so fork code can be deployed only after the protected
# Environment gate. Fork `pull_request` runs get a read-only `GITHUB_TOKEN`, so they cannot comment
# on PRs. This follow-up `workflow_run` executes from the default branch, downloads only the small
# JSON artifact emitted by `deploy-pr-preview.yml`, and posts/updates the PR comment without running
# contributor code.

name: PR preview comment

on:
  workflow_run:
    workflows: ["PR preview"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  comment:
    name: Upsert PR preview comment
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Locate preview comment artifact
        id: artifact
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run_id = context.payload.workflow_run.id;

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id,
              per_page: 100,
            });

            const hit = artifacts.find((artifact) => artifact.name === "pr-preview-comment");
            core.setOutput("found", hit ? "true" : "false");
            if (!hit) {
              core.notice("No pr-preview-comment artifact found; likely a closed PR teardown run.");
            }

      - name: Download preview comment artifact
        if: steps.artifact.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-comment
          path: pr-preview-comment
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upsert preview comment on PR
        if: steps.artifact.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");

            const payload = JSON.parse(fs.readFileSync("pr-preview-comment/payload.json", "utf8"));
            const prNumber = Number(payload.pr_number);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error(`Invalid PR number in artifact: ${JSON.stringify(payload.pr_number)}`);
            }

            const workflowPrNumbers = (context.payload.workflow_run.pull_requests ?? []).map((pr) => pr.number);
            if (workflowPrNumbers.length > 0 && !workflowPrNumbers.includes(prNumber)) {
              throw new Error(
                `Artifact PR number ${prNumber} does not match workflow_run pull requests ${workflowPrNumbers.join(", ")}`,
              );
            }

            const webUrl = String(payload.web_url ?? "").trim();
            const summaryLine = String(payload.summary_line ?? "").trim() || "Preview status unavailable.";
            const runUrl = String(payload.run_url ?? context.payload.workflow_run.html_url ?? "").trim();
            const sha = String(payload.head_sha ?? "").slice(0, 7);
            const deployOutcome = String(payload.deploy_outcome ?? "").trim() || context.payload.workflow_run.conclusion || "unknown";

            const marker = "<!-- cf-starter-pr-preview -->";
            const bodyLines = [
              marker,
              "# PR preview (cf-starter)",
              "",
              `- ${summaryLine}`,
              `- Workflow: [Actions run](${runUrl})`,
              `- Commit SHA: \`${sha}\``,
              `- Deploy step: **${deployOutcome}**`,
            ];
            if (webUrl.length > 0) {
              bodyLines.push("", `**Preview:** [Open workers.dev app](${webUrl})`);
            }
            bodyLines.push("", "_This comment updates whenever the preview workflow finishes._");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = bodyLines.join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing?.id != null) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });

name: Deploy production

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy preflight
        id: preflight
        env:
          CI: true
          STAGE: prod
          CF_STARTER_DEPLOY_ENABLED: ${{ vars.CF_STARTER_DEPLOY_ENABLED }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preflight:prod

      - name: Turbo deploy (production)
        id: deploy
        if: steps.preflight.outputs.deploy_enabled == 'true'
        env:
          CI: true
          STAGE: prod
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          bun run deploy:prod 2>&1 | tee deploy-output.txt

      - name: Deploy summary
        if: always()
        env:
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PF_OUT="${{ steps.preflight.outcome }}"
          DE_OUT="${{ steps.deploy.outcome }}"
          EN="${{ steps.preflight.outputs.deploy_enabled }}"
          WEB_URL=""
          if [[ -f deploy-output.txt ]]; then
            WEB_URL=$(grep 'webUrl:' deploy-output.txt | sed -n 's/.*webUrl:[[:space:]]*"\([^"]*\)".*/\1/p' | tail -1)
          fi
          {
            echo "## Production deploy"
            echo ""
            if [[ "$PF_OUT" == "failure" ]]; then
              echo "**Status:** preflight failed — see **Deploy preflight**."
            elif [[ "$PF_OUT" == "skipped" ]]; then
              echo "**Status:** an earlier step failed or was cancelled before preflight (often **Install dependencies**)."
            elif [[ "$EN" != "true" ]]; then
              echo "**Status:** skipped — \`CF_STARTER_DEPLOY_ENABLED\` is not \`true\` on the **production** Environment."
            elif [[ "$DE_OUT" == "success" ]]; then
              echo "**Status:** success"
              echo ""
              if [[ -n "$WEB_URL" ]]; then
                echo "**App (workers.dev):** [$WEB_URL]($WEB_URL)"
                echo "::notice title=Production-deploy::$WEB_URL"
              else
                echo "_Deploy finished but \`webUrl\` was not found in logs; open **Turbo deploy (production)** and search for \`webUrl\`._"
              fi
            elif [[ "$DE_OUT" == "failure" ]]; then
              echo "**Status:** Turbo deploy failed — see **Turbo deploy (production)**."
            else
              echo "**Status:** unknown — inspect [this run]($WORKFLOW_URL)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

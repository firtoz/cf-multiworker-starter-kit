# PR preview deploy and teardown for same-repo workflows.
#
# Security notes:
# - Workflow definitions run from default branch YAML; malicious PR edits here do not run until merged.
# - Deploy steps checkout the PR HEAD and execute `bun install` etc., so compromised PR branches can run
#   arbitrary code once a maintainer approves the **staging** environment deployment in Actions.
# - Fork PRs are blocked unless repository variable `CF_STARTER_ALLOW_PREVIEW_FOR_FORK_PRS=true` (default off).
# - Preview/staging secrets should stay narrowly scoped Cloudflare tokens.

name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  # Same-repo PRs always pass. Fork PRs require repo variable CF_STARTER_ALLOW_PREVIEW_FOR_FORK_PRS=true
  # (repository Actions variables — not the staging Environment) so untrusted branches do not deploy by default.
  preview_policy_gate:
    name: PR preview policy (fork gate)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce fork PR preview policy
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          FORK_PREVIEW_ALLOWED: ${{ vars.CF_STARTER_ALLOW_PREVIEW_FOR_FORK_PRS }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_REPO" == "$BASE_REPO" ]]; then
            echo "Same-repo PR — fork policy satisfied."
            exit 0
          fi
          v=$(echo "${FORK_PREVIEW_ALLOWED:-}" | tr '[:upper:]' '[:lower:]')
          if [[ "$v" == "true" ]]; then
            echo "Fork PR preview allowed (repository variable CF_STARTER_ALLOW_PREVIEW_FOR_FORK_PRS=true)."
            exit 0
          fi
          echo '::error::PR preview deploy is disabled for fork PRs (untrusted code on pull_request). A maintainer can set repository Actions variable CF_STARTER_ALLOW_PREVIEW_FOR_FORK_PRS=true to opt in, or open the PR from a branch on this repository.'
          exit 1

  destroy_preview:
    name: Destroy PR preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      # Use base branch HEAD so teardown does not run package.json/scripts from an untrusted PR branch.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies (trusted branch)
        run: bun install --frozen-lockfile

      - name: Deploy preflight
        id: preflight
        env:
          CI: true
          STAGE: pr-${{ github.event.pull_request.number }}
          CF_STARTER_DEPLOY_ENABLED: ${{ vars.CF_STARTER_DEPLOY_ENABLED }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preflight:preview

      # Only deploy secrets beyond preflight strictly on destroy (staging env).
      - name: Turbo destroy (preview)
        id: destroy
        if: steps.preflight.outputs.deploy_enabled == 'true'
        env:
          CI: true
          STAGE: pr-${{ github.event.pull_request.number }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          bun run destroy:preview 2>&1 | tee destroy-output.txt

      - name: Destroy summary
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PF_OUT="${{ steps.preflight.outcome }}"
          DS_OUT="${{ steps.destroy.outcome }}"
          EN="${{ steps.preflight.outputs.deploy_enabled }}"
          {
            echo "## PR #${PR_NUMBER} preview teardown"
            echo ""
            if [[ "$PF_OUT" == "failure" ]]; then
              echo "**Status:** preflight failed — destroy was not attempted."
            elif [[ "$PF_OUT" == "skipped" ]]; then
              echo "**Status:** cancelled before preflight completed."
            elif [[ "$EN" != "true" ]]; then
              echo "**Status:** skipped — deploy was not enabled; nothing to tear down via CI."
            elif [[ "$DS_OUT" == "success" ]]; then
              echo "**Status:** Turbo **destroy** completed for \`STAGE=pr-${PR_NUMBER}\`."
            elif [[ "$DS_OUT" == "failure" ]]; then
              echo "**Status:** Turbo destroy failed — see **Turbo destroy (preview)**."
            else
              echo "**Status:** unknown — inspect [this run]($WORKFLOW_URL)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_preview:
    name: Deploy PR preview
    needs: preview_policy_gate
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: staging

    outputs:
      web_url: ${{ steps.preview_outputs.outputs.web_url }}
      deploy_enabled: ${{ steps.preview_outputs.outputs.deploy_enabled }}
      summary_line: ${{ steps.preview_outputs.outputs.summary_line }}

    steps:
      # PR branch — required for deploying the contributor's code path.
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy preflight
        id: preflight
        env:
          CI: true
          STAGE: pr-${{ github.event.pull_request.number }}
          CF_STARTER_DEPLOY_ENABLED: ${{ vars.CF_STARTER_DEPLOY_ENABLED }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preflight:preview

      - name: Turbo deploy (preview)
        id: deploy
        if: steps.preflight.outputs.deploy_enabled == 'true'
        env:
          CI: true
          STAGE: pr-${{ github.event.pull_request.number }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          bun run deploy:preview 2>&1 | tee deploy-output.txt
          deploy_status=${PIPESTATUS[0]}
          URL_FILE="$GITHUB_WORKSPACE/.alchemy/ci/cf-starter-web-deploy-url.txt"
          WEB_URL=""
          if [[ -f "$URL_FILE" ]]; then
            IFS= read -r WEB_URL <"$URL_FILE" || true
          fi
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"
          exit "$deploy_status"

      - name: Deploy summary
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEB_URL_FROM_STEP: ${{ steps.deploy.outputs.web_url }}
        run: |
          PF_OUT="${{ steps.preflight.outcome }}"
          DE_OUT="${{ steps.deploy.outcome }}"
          EN="${{ steps.preflight.outputs.deploy_enabled }}"
          WEB_URL="$WEB_URL_FROM_STEP"
          URL_FILE="$GITHUB_WORKSPACE/.alchemy/ci/cf-starter-web-deploy-url.txt"
          if [[ -z "$WEB_URL" && -f "$URL_FILE" ]]; then
            IFS= read -r WEB_URL <"$URL_FILE" || true
          fi
          {
            echo "## PR #${PR_NUMBER} preview deploy"
            echo ""
            if [[ "$PF_OUT" == "failure" ]]; then
              echo "**Status:** preflight failed — see **Deploy preflight**."
            elif [[ "$PF_OUT" == "skipped" ]]; then
              echo "**Status:** an earlier step failed or was cancelled before preflight."
            elif [[ "$EN" != "true" ]]; then
              echo "**Status:** skipped — \`CF_STARTER_DEPLOY_ENABLED\` is not \`true\` on the **staging** Environment."
            elif [[ "$DE_OUT" == "success" ]]; then
              echo "**Status:** success"
              echo ""
              if [[ -n "$WEB_URL" ]]; then
                echo "**Preview (workers.dev):** [$WEB_URL]($WEB_URL)"
              else
                echo "- **workers.dev preview URL:** artifact missing — ${GITHUB_WORKSPACE}/.alchemy/ci/cf-starter-web-deploy-url.txt _(see apps/web/alchemy.run.ts)._"
              fi
            elif [[ "$DE_OUT" == "failure" ]]; then
              echo "**Status:** Turbo deploy failed — see **Turbo deploy (preview)**."
            elif [[ "$DE_OUT" == "skipped" ]]; then
              echo "**Status:** Turbo deploy skipped (preflight indicated deploy disabled or earlier failure)."
            else
              echo "**Status:** unknown — inspect [this run]($WORKFLOW_URL)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - id: preview_outputs
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PF_OUT: ${{ steps.preflight.outcome }}
          DE_OUT: ${{ steps.deploy.outcome }}
          DE_WEB: ${{ steps.deploy.outputs.web_url }}
          EN_SET: ${{ steps.preflight.outputs.deploy_enabled }}
          URL_FILE_PATH: ${{ github.workspace }}/.alchemy/ci/cf-starter-web-deploy-url.txt
        run: |
          set -euo pipefail
          WEB="$DE_WEB"
          if [[ -z "$WEB" && -f "$URL_FILE_PATH" ]]; then
            IFS= read -r WEB <"$URL_FILE_PATH" || WEB=""
          fi
          SUMMARY=""
          if [[ "$PF_OUT" == "failure" ]]; then
            SUMMARY='Preflight failed — see Deploy preflight in Actions.'
          elif [[ "$PF_OUT" == "skipped" ]]; then
            SUMMARY='Run cancelled/skipped before preflight.'
          elif [[ "$EN_SET" != "true" ]]; then
            SUMMARY='Skipped — staging env `CF_STARTER_DEPLOY_ENABLED` is not `true`.'
          elif [[ "$DE_OUT" == "success" ]] && [[ -n "$WEB" ]]; then
            SUMMARY="Preview **success** · [Open app](${WEB})"
          elif [[ "$DE_OUT" == "success" ]]; then
            SUMMARY='Deploy succeeded — preview workers.dev URL missing in CI artifact.'
          elif [[ "$DE_OUT" == "failure" ]]; then
            SUMMARY='Turbo deploy failed — see **Turbo deploy (preview)** in Actions.'
          elif [[ "$DE_OUT" == "skipped" ]]; then
            SUMMARY='Deploy step skipped.'
          else
            SUMMARY="Unknown status — inspect [workflow run]($WORKFLOW_URL)."
          fi

          {
            echo "deploy_enabled=${EN_SET:-}"
            echo "summary_line<<PSUM"
            echo "$SUMMARY"
            echo "PSUM"
            echo "web_url<<WURL"
            echo "${WEB}"
            echo "WURL"
          } >>"$GITHUB_OUTPUT"

  post_preview_comment:
    name: PR preview bot comment
    needs: [preview_policy_gate, deploy_preview]
    if: >-
      always()
      && github.event.action != 'closed'
      && needs.preview_policy_gate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Upsert preview comment on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_WEB_URL: ${{ needs.deploy_preview.outputs.web_url }}
          PREVIEW_SUMMARY_LINE: ${{ needs.deploy_preview.outputs.summary_line }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA_SHORT: ${{ github.event.pull_request.head.sha }}
          JOB_RESULT: ${{ needs.deploy_preview.result }}
        with:
          script: |
            const webUrl = (process.env.PREVIEW_WEB_URL ?? "").trim();
            const summaryLine = (process.env.PREVIEW_SUMMARY_LINE ?? "").trim();

            const marker = "<!-- cf-starter-pr-preview -->";
            const prNumber = Number(process.env.PR_NUMBER);
            const runUrl = process.env.RUN_URL ?? "";
            const sha = (process.env.HEAD_SHA_SHORT ?? "").slice(0, 7);
            const jobResult = process.env.JOB_RESULT ?? "";

            const header = `# PR preview (cf-starter)`;
            let bodyLines = [
              marker,
              header,
              "",
              `- ${summaryLine}`,
              `- Workflow: [Actions run](${runUrl})`,
              `- Commit SHA: \`${sha}\``,
              `- Deploy job: **${jobResult}**`,
            ];
            if (webUrl.length > 0) {
              bodyLines.push("", `**Preview:** [Open workers.dev app](${webUrl})`);
            }
            bodyLines.push("", "_This comment updates whenever the preview workflow finishes._");

            let body = bodyLines.join("\n");

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            let existing = comments.find((c) => c.body?.includes(marker));
            /** Walk pages if marker not in first batch */
            if (!existing && comments.length === 100) {
              for (let page = 2; page <= 5; page++) {
                const { data: pageComments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100,
                  page,
                });
                existing = pageComments.find((c) => c.body?.includes(marker));
                if (existing || pageComments.length < 100) break;
              }
            }

            if (existing?.id != null) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

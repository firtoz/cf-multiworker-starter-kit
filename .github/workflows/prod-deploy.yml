# **Production deploy** — push **`production`** (**`workflow_dispatch`** supported). Gated by **`DEPLOY_ENABLED`** on **`production`**.
name: Production deploy

env:
  TURBO_TELEMETRY_DISABLED: "1"

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Require production branch on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/production" ]; then
            echo "::error::Manual production deploy must be run from ref refs/heads/production (select branch \"production\" in the workflow_dispatch UI)."
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy preflight
        id: preflight
        env:
          CI: true
          STAGE: prod
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preflight:prod

      - name: Turbo deploy (production)
        id: deploy
        if: steps.preflight.outputs.deploy_enabled == 'true'
        env:
          CI: true
          STAGE: prod
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CHATROOM_INTERNAL_SECRET: ${{ secrets.CHATROOM_INTERNAL_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          WEB_DOMAINS: ${{ vars.WEB_DOMAINS }}
          WEB_ROUTES: ${{ vars.WEB_ROUTES }}
          WEB_ZONE_ID: ${{ vars.WEB_ZONE_ID }}
          WEB_DOMAIN_OVERRIDE_EXISTING_ORIGIN: ${{ vars.WEB_DOMAIN_OVERRIDE_EXISTING_ORIGIN }}
        run: |
          set -o pipefail
          bun run deploy:prod 2>&1 | tee deploy-output.txt
          deploy_status=${PIPESTATUS[0]}
          URL_FILE="$GITHUB_WORKSPACE/.alchemy/ci/web-deploy-url.txt"
          WEB_URL=""
          if [[ -f "$URL_FILE" ]]; then
            IFS= read -r WEB_URL <"$URL_FILE" || true
          fi
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"
          exit "$deploy_status"

      - name: Deploy summary
        if: always()
        env:
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEB_URL_FROM_STEP: ${{ steps.deploy.outputs.web_url }}
        run: |
          PF_OUT="${{ steps.preflight.outcome }}"
          DE_OUT="${{ steps.deploy.outcome }}"
          EN="${{ steps.preflight.outputs.deploy_enabled }}"
          WEB_URL="$WEB_URL_FROM_STEP"
          URL_FILE="$GITHUB_WORKSPACE/.alchemy/ci/web-deploy-url.txt"
          if [[ -z "$WEB_URL" && -f "$URL_FILE" ]]; then
            IFS= read -r WEB_URL <"$URL_FILE" || true
          fi
          {
            echo "## Production deploy"
            echo ""
            if [[ "$PF_OUT" == "failure" ]]; then
              echo "**Status:** preflight failed — see **Deploy preflight**."
            elif [[ "$PF_OUT" == "skipped" ]]; then
              echo "**Status:** an earlier step failed or was cancelled before preflight (often **Install dependencies**)."
            elif [[ "$EN" != "true" ]]; then
              echo "**Status:** skipped — \`DEPLOY_ENABLED\` is not \`true\` on the **production** Environment."
            elif [[ "$DE_OUT" == "success" ]]; then
              echo "**Status:** success"
              echo ""
              if [[ -n "$WEB_URL" ]]; then
                echo "**App (workers.dev):** [$WEB_URL]($WEB_URL)"
              else
                echo "- **workers.dev URL:** artifact missing — ${GITHUB_WORKSPACE}/.alchemy/ci/web-deploy-url.txt _(see apps/web/alchemy.run.ts when CI runs on GitHub Actions)._"
              fi
            elif [[ "$DE_OUT" == "failure" ]]; then
              echo "**Status:** Turbo deploy failed — see **Turbo deploy (production)**."
            else
              echo "**Status:** unknown — inspect [this run]($WORKFLOW_URL)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
